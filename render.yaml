services:
  - type: web
    name: medical-app-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && node dist/main
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: medical-app-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: medical-app-db
    plan: free
